apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-pre-config
  labels:
    app: uim-sap-pre
data:
  PRE_HOST: "0.0.0.0"
  PRE_PORT: "8093"
  PRE_BASE_PATH: "/api/pre"
  PRE_SERVICE_NAME: "uim-pre"
  PRE_SERVICE_VERSION: "1.0.0"
  PRE_MAX_ITEMS_PER_TENANT: "500000"
  PRE_MAX_USERS_PER_TENANT: "1000000"
  PRE_MAX_INTERACTIONS_PER_USER: "10000"
  PRE_MAX_MODELS_PER_TENANT: "50"
  PRE_MAX_SCENARIOS_PER_TENANT: "100"
  PRE_DEFAULT_LIMIT: "10"
  PRE_MAX_LIMIT: "100"
  PRE_DEFAULT_TENANT_ID: "default"
  PRE_MULTITENANCY: "true"
