apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-content-agent
  labels:
    app: uim-sap-content-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-content-agent
  template:
    metadata:
      labels:
        app: uim-sap-content-agent
    spec:
      containers:
      - name: uim-sap-content-agent
        image: ghcr.io/uimsolutions/uim-sap-content-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8096
        envFrom:
        - configMapRef:
            name: uim-sap-content-agent-config
        env:
        - name: CAG_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-content-agent-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/content-agent/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/content-agent/health
            port: http
          initialDelaySeconds: 8
          periodSeconds: 10
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 1Gi
