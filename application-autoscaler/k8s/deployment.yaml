apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-aas
  labels:
    app: uim-sap-aas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-aas
  template:
    metadata:
      labels:
        app: uim-sap-aas
    spec:
      containers:
      - name: uim-sap-aas
        image: ghcr.io/uimsolutions/uim-sap-aas:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8086
        envFrom:
        - configMapRef:
            name: uim-sap-aas-config
        env:
        - name: AAS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-aas-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/autoscaler/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/autoscaler/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 800m
            memory: 768Mi
