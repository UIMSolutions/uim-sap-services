apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-atp
  labels:
    app: uim-sap-atp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uim-sap-atp
  template:
    metadata:
      labels:
        app: uim-sap-atp
    spec:
      containers:
      - name: uim-sap-atp
        image: uim-sap-atp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8097
        envFrom:
        - configMapRef:
            name: uim-sap-atp-config
        env:
        - name: ATP_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-atp-secret
              key: authToken
              optional: true
        readinessProbe:
          httpGet:
            path: /api/automation-pilot/ready
            port: 8097
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/automation-pilot/health
            port: 8097
          initialDelaySeconds: 8
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
