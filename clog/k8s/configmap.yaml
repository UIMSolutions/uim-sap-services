apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-scl-config
  labels:
    app: uim-sap-scl
data:
  SCL_HOST: "0.0.0.0"
  SCL_PORT: "8081"
  SCL_BASE_PATH: "/sap/cloud/logging/v1"
  SCL_SERVICE_NAME: "uim-sap-scl"
  SCL_SERVICE_VERSION: "1.0.0"
  SCL_MAX_ENTRIES: "20000"
  SCL_DEFAULT_QUERY_LIMIT: "200"
