apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-cloud-integration-automation
  labels:
    app: uim-sap-cloud-integration-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-cloud-integration-automation
  template:
    metadata:
      labels:
        app: uim-sap-cloud-integration-automation
    spec:
      containers:
      - name: uim-sap-cloud-integration-automation
        image: ghcr.io/uimsolutions/uim-sap-cloud-integration-automation:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8098
        envFrom:
        - configMapRef:
            name: uim-sap-cloud-integration-automation-config
        env:
        - name: CIA_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-cloud-integration-automation-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/cloud-integration-automation/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/cloud-integration-automation/health
            port: http
          initialDelaySeconds: 8
          periodSeconds: 10
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 1Gi
