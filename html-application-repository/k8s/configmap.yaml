apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-html5-repo-config
  labels:
    app: uim-sap-html5-repo
data:
  HTM_REPO_HOST: "0.0.0.0"
  HTM_REPO_PORT: "8094"
  HTM_REPO_BASE_PATH: "/api/html5-repo"
  HTM_REPO_SERVICE_NAME: "uim-html5-app-repo"
  HTM_REPO_SERVICE_VERSION: "1.0.0"
  HTM_REPO_DATA_DIR: "/var/lib/uim-html5-repo"
  HTM_REPO_CACHE_TTL_SECONDS: "120"
  HTM_REPO_DEFAULT_TENANT: "provider"
  HTM_REPO_DEFAULT_SPACE: "dev"
  HTM_REPO_ALLOW_PUBLIC_CROSS_SPACE: "true"
  HTM_REPO_MAX_UPLOAD_BYTES: "52428800"
