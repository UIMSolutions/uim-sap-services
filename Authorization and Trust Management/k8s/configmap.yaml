apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-atm-config
  labels:
    app: uim-sap-atm
data:
  ATM_HOST: "0.0.0.0"
  ATM_PORT: "8088"
  ATM_BASE_PATH: "/api/atm"
  ATM_SERVICE_NAME: "uim-sap-atm"
  ATM_SERVICE_VERSION: "1.0.0"
  ATM_DEFAULT_IDP_NAME: "sap-id-service"
  ATM_DEFAULT_IDP_ISSUER: "https://accounts.sap.com"
  ATM_DEFAULT_IDP_AUDIENCE: "uim-sap-app"
  ATM_ALLOW_UNSIGNED_TOKENS: "true"
  ATM_ENFORCE_TOKEN_EXPIRY: "true"
