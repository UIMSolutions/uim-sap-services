apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-obs-config
  labels:
    app: uim-sap-obs
data:
  OBS_HOST: "0.0.0.0"
  OBS_PORT: "8091"
  OBS_BASE_PATH: "/api/obs"
  OBS_SERVICE_NAME: "uim-obs"
  OBS_SERVICE_VERSION: "1.0.0"
  OBS_MAX_BUCKETS: "500"
  OBS_MAX_OBJECTS_PER_BUCKET: "100000"
  OBS_MAX_OBJECT_SIZE: "104857600"
  OBS_MAX_BUCKET_STORAGE: "10737418240"
  OBS_DEFAULT_PROVIDER: "aws"
  OBS_DEFAULT_REGION: "eu-central-1"
  OBS_DEFAULT_VERSIONING: "false"
