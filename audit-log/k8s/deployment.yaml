apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-audit-log
  labels:
    app: uim-sap-audit-log
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-audit-log
  template:
    metadata:
      labels:
        app: uim-sap-audit-log
    spec:
      containers:
      - name: uim-sap-audit-log
        image: ghcr.io/uimsolutions/uim-sap-audit-log:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8090
        envFrom:
        - configMapRef:
            name: uim-sap-audit-log-config
        env:
        - name: AUDITLOG_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-audit-log-secret
              key: auth-token
              optional: true
        - name: AUDITLOG_OAUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-audit-log-secret
              key: oauth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/auditlog/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/auditlog/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 1Gi
