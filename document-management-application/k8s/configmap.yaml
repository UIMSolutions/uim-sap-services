apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-document-management-config
  labels:
    app: uim-sap-document-management
data:
  DMS_HOST: "0.0.0.0"
  DMS_PORT: "8090"
  DMS_BASE_PATH: "/api/docmgmt"
  DMS_SERVICE_NAME: "uim-sap-document-management"
  DMS_SERVICE_VERSION: "1.0.0"
  DMS_MAX_UPLOAD_SIZE_MB: "100"
  DMS_DEFAULT_REPOSITORY: "internal"
  DMS_ENCRYPTION_ENABLED: "false"
  DMS_VERSIONING_ENABLED: "true"
