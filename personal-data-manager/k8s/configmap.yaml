apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-pdm-config
  labels:
    app: uim-sap-pdm
data:
  PDM_HOST: "0.0.0.0"
  PDM_PORT: "8092"
  PDM_BASE_PATH: "/api/pdm"
  PDM_SERVICE_NAME: "uim-pdm"
  PDM_SERVICE_VERSION: "1.0.0"
  PDM_MAX_SUBJECTS_PER_TENANT: "100000"
  PDM_MAX_REQUESTS_PER_TENANT: "10000"
  PDM_MAX_RECORDS_PER_SUBJECT: "500"
  PDM_REQUEST_TIMEOUT_SECS: "86400"
  PDM_DEFAULT_TENANT_ID: "default"
  PDM_MULTITENANCY: "true"
