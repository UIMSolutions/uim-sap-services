apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-pdm
  labels:
    app: uim-sap-pdm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-pdm
  template:
    metadata:
      labels:
        app: uim-sap-pdm
    spec:
      containers:
      - name: uim-sap-pdm
        image: ghcr.io/uimsolutions/uim-sap-pdm:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8092
        envFrom:
        - configMapRef:
            name: uim-sap-pdm-config
        env:
        - name: PDM_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-pdm-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/pdm/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/pdm/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
