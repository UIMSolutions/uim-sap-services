apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-alert-notification-service
  labels:
    app: uim-alert-notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uim-alert-notification-service
  template:
    metadata:
      labels:
        app: uim-alert-notification-service
    spec:
      containers:
      - name: uim-alert-notification-service
        image: uimsolutions/uim-alert-notification-service:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: uim-alert-notification-config
        ports:
        - containerPort: 8097
        readinessProbe:
          httpGet:
            path: /api/alert-notification/ready
            port: 8097
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/alert-notification/health
            port: 8097
          initialDelaySeconds: 5
          periodSeconds: 10
