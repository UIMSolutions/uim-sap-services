apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-kym-config
  labels:
    app: uim-sap-kym
data:
  KYM_HOST: "0.0.0.0"
  KYM_PORT: "8088"
  KYM_BASE_PATH: "/api/kym"
  KYM_SERVICE_NAME: "uim-kym"
  KYM_SERVICE_VERSION: "1.0.0"
  KYM_MAX_NAMESPACES: "100"
  KYM_MAX_FUNCTIONS_PER_NS: "500"
  KYM_MAX_MICROSERVICES_PER_NS: "200"
  KYM_MAX_SUBSCRIPTIONS_PER_NS: "1000"
  KYM_DEFAULT_FUNCTION_TIMEOUT: "30"
  KYM_DEFAULT_REPLICAS: "1"
