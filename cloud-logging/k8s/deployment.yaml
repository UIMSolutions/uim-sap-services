apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-clg
  labels:
    app: uim-sap-clg
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-clg
  template:
    metadata:
      labels:
        app: uim-sap-clg
    spec:
      containers:
      - name: uim-sap-clg
        image: ghcr.io/uimsolutions/uim-sap-clg:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8081
        envFrom:
        - configMapRef:
            name: uim-sap-clg-config
        env:
        - name: CLG_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-clg-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /sap/cloud/logging/v1/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /sap/cloud/logging/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
