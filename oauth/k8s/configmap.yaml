apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-oau-config
  labels:
    app: uim-sap-oau
data:
  OAU_HOST: "0.0.0.0"
  OAU_PORT: "8090"
  OAU_BASE_PATH: "/api/oau"
  OAU_SERVICE_NAME: "uim-oau"
  OAU_SERVICE_VERSION: "1.0.0"
  OAU_MAX_CLIENTS: "1000"
  OAU_AUTH_CODE_LIFETIME: "600"
  OAU_ACCESS_TOKEN_LIFETIME: "3600"
  OAU_REFRESH_TOKEN_LIFETIME: "86400"
  OAU_MAX_SCOPES_PER_CLIENT: "50"
  OAU_ISSUER: "uim-oau"
