apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-job-scheduling
  labels:
    app: uim-sap-job-scheduling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-job-scheduling
  template:
    metadata:
      labels:
        app: uim-sap-job-scheduling
    spec:
      containers:
      - name: uim-sap-job-scheduling
        image: ghcr.io/uimsolutions/uim-sap-job-scheduling:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8101
        envFrom:
        - configMapRef:
            name: uim-sap-job-scheduling-config
        env:
        - name: JOBS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-job-scheduling-secret
              key: auth-token
              optional: true
        - name: JOBS_ALERT_API_KEY
          valueFrom:
            secretKeyRef:
              name: uim-sap-job-scheduling-secret
              key: alert-api-key
              optional: true
        - name: JOBS_CLOUD_ALM_API_KEY
          valueFrom:
            secretKeyRef:
              name: uim-sap-job-scheduling-secret
              key: cloud-alm-api-key
              optional: true
        readinessProbe:
          httpGet:
            path: /api/job-scheduling/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/job-scheduling/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            cpu: 700m
            memory: 1024Mi
