apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-analytics-config
  labels:
    app: uim-sap-analytics
data:
  ANALYTICS_HOST: "0.0.0.0"
  ANALYTICS_PORT: "8090"
  ANALYTICS_BASE_PATH: "/api/analytics"
  ANALYTICS_SERVICE_NAME: "uim-analytics"
  ANALYTICS_SERVICE_VERSION: "1.0.0"
  ANALYTICS_MAX_STORIES: "1000"
  ANALYTICS_MAX_DASHBOARDS: "500"
  ANALYTICS_MAX_DATASETS: "200"
  ANALYTICS_MAX_MODELS: "100"
  ANALYTICS_MAX_CONNECTIONS: "50"
  ANALYTICS_MAX_USERS: "10000"
  ANALYTICS_PREDICTION_TIMEOUT: "300"
  ANALYTICS_DEFAULT_PLAN: "standard"
