apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-analytics
  labels:
    app: uim-sap-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-analytics
  template:
    metadata:
      labels:
        app: uim-sap-analytics
    spec:
      containers:
      - name: uim-sap-analytics
        image: ghcr.io/uimsolutions/uim-sap-analytics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8090
        envFrom:
        - configMapRef:
            name: uim-sap-analytics-config
        env:
        - name: ANALYTICS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-analytics-secret
              key: auth-token
              optional: true
        - name: ANALYTICS_DATASPHERE_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: uim-sap-analytics-secret
              key: datasphere-endpoint
              optional: true
        readinessProbe:
          httpGet:
            path: /api/analytics/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/analytics/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
