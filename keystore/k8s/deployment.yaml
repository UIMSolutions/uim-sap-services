apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-kst
  labels:
    app: uim-sap-kst
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-kst
  template:
    metadata:
      labels:
        app: uim-sap-kst
    spec:
      containers:
      - name: uim-sap-kst
        image: ghcr.io/uimsolutions/uim-sap-kst:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8087
        envFrom:
        - configMapRef:
            name: uim-sap-kst-config
        env:
        - name: KST_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-kst-secret
              key: auth-token
              optional: true
        - name: KST_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: uim-sap-kst-secret
              key: master-key
              optional: true
        readinessProbe:
          httpGet:
            path: /api/kst/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/kst/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
