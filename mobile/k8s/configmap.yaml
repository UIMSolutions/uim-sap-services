apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-mob-config
  labels:
    app: uim-sap-mob
data:
  MOB_HOST: "0.0.0.0"
  MOB_PORT: "8089"
  MOB_BASE_PATH: "/api/mob"
  MOB_SERVICE_NAME: "uim-mob"
  MOB_SERVICE_VERSION: "1.0.0"
  MOB_MAX_APPLICATIONS: "500"
  MOB_MAX_VERSIONS_PER_APP: "100"
  MOB_MAX_USERS_PER_APP: "10000"
  MOB_MAX_NOTIFICATIONS_PER_APP: "5000"
  MOB_DEFAULT_SYNC_INTERVAL: "300"
