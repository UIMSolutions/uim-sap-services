apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-isa
  labels:
    app: uim-sap-isa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-isa
  template:
    metadata:
      labels:
        app: uim-sap-isa
    spec:
      containers:
      - name: uim-sap-isa
        image: ghcr.io/uimsolutions/uim-sap-isa:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8088
        envFrom:
        - configMapRef:
            name: uim-sap-isa-config
        env:
        - name: ISA_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-isa-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/situation-automation/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/situation-automation/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 768Mi
