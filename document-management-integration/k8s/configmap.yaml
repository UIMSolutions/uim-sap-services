apiVersion: v1
kind: ConfigMap
metadata:
  name: uim-sap-docmgmt-integration-config
  labels:
    app: uim-sap-docmgmt-integration
data:
  DMSI_HOST: "0.0.0.0"
  DMSI_PORT: "8091"
  DMSI_BASE_PATH: "/api/docmgmt-integration"
  DMSI_SERVICE_NAME: "uim-docmgmt-integration"
  DMSI_SERVICE_VERSION: "1.0.0"
  DMSI_MAX_UPLOAD_SIZE_MB: "100"
  DMSI_DEFAULT_REPOSITORY: "internal"
  DMSI_ENCRYPTION_ENABLED: "false"
  DMSI_VERSIONING_ENABLED: "true"
  DMSI_MULTITENANCY_ENABLED: "true"
