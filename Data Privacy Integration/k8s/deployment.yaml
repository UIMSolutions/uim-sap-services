apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-sap-dpi
  labels:
    app: uim-sap-dpi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-sap-dpi
  template:
    metadata:
      labels:
        app: uim-sap-dpi
    spec:
      containers:
      - name: uim-sap-dpi
        image: ghcr.io/uimsolutions/uim-sap-dpi:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8093
        envFrom:
        - configMapRef:
            name: uim-sap-dpi-config
        env:
        - name: DPI_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: uim-sap-dpi-secret
              key: auth-token
              optional: true
        readinessProbe:
          httpGet:
            path: /api/dpi/ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/dpi/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
